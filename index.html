<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>untuk u, sayanggg</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="lara.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" class="music-btn">
        <span class="music-icon">🎵</span> Putar Musik
    </button>

    <div id="particles-container"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <section id="landing-page" class="page active">
        <div class="container main-card">
            <h1 class="fade-in-up">I punya sesuatuu buwatt u...</h1>
            <p class="fade-in-up delay-1">i tawu i sudaa membuat kesalahan. sebelum u memutuskan apaa pun... i menyampaikan isi hati i.</p>
            
            <div class="btn-group fade-in-up delay-2">
                <button id="btn-yes" class="btn btn-primary">❤️ Dimaafin</button>
                <button id="btn-no" class="btn btn-danger">💔 Ga Dimaafin</button>
            </div>
            <p id="floating-text" class="floating-text"></p>
        </div>
    </section>

    <div id="cinematic-transition" class="hidden">
        <div class="flash"></div>
    </div>

    <section id="letter-page" class="page hidden">
        <div class="container glass-card">
            <div class="photo-wrapper">
                <img src="my.jpeg" alt="Pacarku Tersayang" class="profile-photo">
            </div>
            
            <div class="letter-box">
                <p id="typewriter-text"></p>
            </div>

            <button id="btn-hug" class="btn btn-hug hidden-btn">🤍 peayukkk virtuall 🤍</button>
        </div>
    </section>

    <div id="success-overlay" class="hidden">
        <div class="success-content">
            <h2 class="scale-up">terimaa kasiiyy sayangggg sudaa memaafin i 🤍</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
